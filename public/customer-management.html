<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Gestión de Clientes | ToolsPK</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=IBM+Plex+Mono:wght@400&family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    /* ═══════════════════════════════════════════════════
       PORTAL TOOLSPK — ESTILOS GLOBALES
    ═══════════════════════════════════════════════════ */
    :root {
      --dark: #0a1520;
      --dark2: #0f1e2e;
      --blue: #0e5fa8;
      --blue2: #1a7dd4;
      --blue3: #3a9de8;
      --gold: #c9922a;
      --surface: #ffffff;
      --surface2: #f4f7fb;
      --border: #dce5f0;
      --ink: #1a2b3c;
      --muted: #6a85a0;
      --radius: 16px;
      --shadow: 0 4px 20px rgba(14,95,168,0.1);
      --success: #28a745;
      --danger: #dc3545;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; font-family: "IBM Plex Sans", sans-serif; color: var(--ink); overflow: hidden; }

    /* ── LAYOUT ── */
    #app { display: flex; height: 100vh; }

    /* ── SIDEBAR ── */
    .sidebar {
      width: 240px; min-width: 240px;
      background: var(--dark);
      display: flex; flex-direction: column;
      height: 100vh; overflow-y: auto;
    }
    .sidebar-logo {
      padding: 20px 12px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .sidebar-logo-name {
      font-family: "Playfair Display", serif;
      font-size: 20px; color: white;
      display: flex; align-items: center; gap: 10px;
    }
    .sidebar-logo-mark {
      width: 32px; height: 32px;
      background: linear-gradient(135deg, var(--blue), var(--blue3));
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px; color: white; font-weight: 700;
      font-family: "Playfair Display", serif;
      flex-shrink: 0;
    }
    .sidebar-logo-sub {
      font-size: 10px; color: rgba(255,255,255,0.3);
      letter-spacing: 1.5px; text-transform: uppercase; margin-top: 3px;
    }
    .sidebar-section {
      padding: 18px 16px 6px;
      font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
      color: rgba(255,255,255,0.25); font-weight: 500;
    }
    .nav-item {
      display: flex; align-items: center; gap: 11px;
      padding: 10px 14px; margin: 2px 8px;
      border-radius: 10px; cursor: pointer;
      transition: all 0.15s; color: rgba(255,255,255,0.5);
      font-size: 13px; border: 1px solid transparent;
    }
    .nav-item:hover { background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.85); }
    .nav-item.active { background: rgba(14,95,168,0.25); border-color: rgba(14,95,168,0.4); color: white; }
    .nav-icon {
      width: 30px; height: 30px; border-radius: 7px;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px; background: rgba(255,255,255,0.07); flex-shrink: 0;
    }
    .nav-item.active .nav-icon { background: rgba(14,95,168,0.4); }
    .sidebar-spacer { flex: 1; }

    /* ── MAIN CONTENT ── */
    .main-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .panel-scroll { flex: 1; overflow-y: auto; }

    /* ── TOOL HEADER ── */
    .tool-header {
      background: white; border-bottom: 1px solid var(--border);
      padding: 14px 28px; display: flex; align-items: center; gap: 14px;
      flex-shrink: 0;
    }
    .back-btn {
      display: flex; align-items: center; gap: 5px;
      padding: 6px 13px; border: 1px solid var(--border);
      border-radius: 8px; background: none; cursor: pointer;
      font-size: 12px; color: var(--muted);
      font-family: "IBM Plex Sans", sans-serif; transition: all 0.15s;
    }
    .back-btn:hover { background: var(--surface2); color: var(--ink); }
    .tool-header-title { font-family: "Playfair Display", serif; font-size: 17px; color: var(--ink); }

    /* ── CONTENT ── */
    .content {
      padding: 28px; background: #f5f8fb;
    }

    .section-title {
      font-family: "Playfair Display", serif;
      font-size: 20px; color: var(--ink);
      margin-bottom: 22px; margin-top: 0;
    }

    .form-group {
      margin-bottom: 18px;
    }

    .form-group label {
      display: block; font-size: 12px;
      font-weight: 500; color: var(--ink);
      margin-bottom: 6px; letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%; padding: 10px 14px;
      border: 1px solid var(--border);
      border-radius: 8px; font-family: "IBM Plex Sans", sans-serif;
      font-size: 13px; color: var(--ink);
      transition: all 0.15s;
    }

    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
      outline: none; border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(14,95,168,0.1);
    }

    .form-row {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 18px;
    }

    .btn {
      padding: 10px 20px; border: none;
      border-radius: 8px; cursor: pointer;
      font-size: 13px; font-weight: 500;
      font-family: "IBM Plex Sans", sans-serif;
      transition: all 0.15s;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--blue), var(--blue2));
      color: white;
    }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(14,95,168,0.2); }

    .btn-secondary {
      background: var(--surface2); color: var(--ink);
      border: 1px solid var(--border);
    }
    .btn-secondary:hover { background: var(--border); }

    .btn-danger {
      background: var(--danger); color: white;
    }
    .btn-danger:hover { background: #c82333; }

    .form-buttons {
      display: flex; gap: 12px; margin-top: 22px;
    }

    /* ── TABLE ── */
    .customers-table {
      width: 100%; border-collapse: collapse;
      background: white; border-radius: var(--radius);
      overflow: hidden; box-shadow: var(--shadow);
    }

    .customers-table thead {
      background: var(--surface2); border-bottom: 2px solid var(--border);
    }

    .customers-table th {
      padding: 14px; text-align: left;
      font-size: 12px; font-weight: 600;
      color: var(--ink); text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .customers-table td {
      padding: 14px; border-bottom: 1px solid var(--border);
      font-size: 13px;
    }

    .customers-table tbody tr:hover {
      background: #fafbfc;
    }

    .customers-table tbody tr:last-child td {
      border-bottom: none;
    }

    .action-buttons {
      display: flex; gap: 8px;
    }

    .action-buttons button {
      padding: 4px 10px; font-size: 11px;
      border: 1px solid var(--border);
      border-radius: 5px; cursor: pointer;
      transition: all 0.15s;
    }

    .action-buttons .btn-edit {
      background: #cfe9f3; color: var(--blue);
    }
    .action-buttons .btn-edit:hover { background: #a8dae8; }

    .action-buttons .btn-delete {
      background: #f8d7da; color: var(--danger);
    }
    .action-buttons .btn-delete:hover { background: #f5c6cb; }

    .empty-state {
      text-align: center; padding: 44px 22px;
      color: var(--muted);
    }

    .empty-state-icon {
      font-size: 48px; margin-bottom: 14px;
    }

    .alert {
      padding: 12px 16px; border-radius: 8px;
      margin-bottom: 18px; font-size: 13px;
    }

    .alert-success {
      background: #d4edda; color: #155724;
      border: 1px solid #c3e6cb;
    }

    .alert-danger {
      background: #f8d7da; color: #721c24;
      border: 1px solid #f5c6cb;
    }

    .two-column {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 28px;
    }

    @media (max-width: 1024px) {
      .two-column { grid-template-columns: 1fr; }
      .form-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<div id="app">
  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-logo">
      <div>
        <div class="sidebar-logo-name">
          <div class="sidebar-logo-mark">▲</div>
          <div>ToolsPK</div>
        </div>
        <div class="sidebar-logo-sub">Proaktiva</div>
      </div>
    </div>

    <div class="sidebar-section">Herramientas</div>
    <div class="nav-item" onclick="window.location.href='/index.html'">
      <div class="nav-icon">🏠</div>
      <div>Home</div>
    </div>
    <div class="nav-item" onclick="window.location.href='/pagare.html'">
      <div class="nav-icon">📄</div>
      <div>Pagaré</div>
    </div>
    <div class="nav-item" onclick="window.location.href='/aforo.html'">
      <div class="nav-icon">📊</div>
      <div>Aforo</div>
    </div>
    <div class="nav-item" onclick="window.location.href='/calc.html'">
      <div class="nav-icon">🧮</div>
      <div>Calculadora</div>
    </div>
    <div class="nav-item active" onclick="window.location.href='/customer-management.html'">
      <div class="nav-icon">👥</div>
      <div>Clientes</div>
    </div>

    <div class="sidebar-spacer"></div>
  </div>

  <!-- MAIN CONTENT -->
  <div class="main-content">
    <div class="tool-header">
      <button class="back-btn" onclick="window.location.href='/index.html'">← Atrás</button>
      <div class="tool-header-title">Gestión de Clientes</div>
    </div>

    <div class="panel-scroll">
      <div class="content">
        <div id="alertContainer"></div>

        <div class="two-column">
          <!-- FORM SECTION -->
          <div>
            <h2 class="section-title">Nuevo Cliente</h2>

            <div class="form-group">
              <label>Nombre Completo</label>
              <input type="text" id="fullName" placeholder="Ej: Juan Pérez">
            </div>

            <div class="form-row">
              <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" placeholder="juan@example.com">
              </div>
              <div class="form-group">
                <label>Teléfono</label>
                <input type="tel" id="phone" placeholder="+1 234 567 890">
              </div>
            </div>

            <div class="form-row">
              <div class="form-group">
                <label>Empresa</label>
                <input type="text" id="company" placeholder="Nombre empresa">
              </div>
              <div class="form-group">
                <label>Puesto</label>
                <input type="text" id="position" placeholder="Cargo">
              </div>
            </div>

            <div class="form-group">
              <label>Ciudad</label>
              <input type="text" id="city" placeholder="Ciudad">
            </div>

            <div class="form-group">
              <label>Estado</label>
              <select id="status">
                <option value="activo">Activo</option>
                <option value="inactivo">Inactivo</option>
                <option value="prospecto">Prospecto</option>
                <option value="cliente-vip">Cliente VIP</option>
              </select>
            </div>

            <div class="form-group">
              <label>Notas</label>
              <textarea id="notes" rows="4" placeholder="Información adicional..."></textarea>
            </div>

            <div class="form-buttons">
              <button class="btn btn-primary" onclick="addCustomer()">Guardar Cliente</button>
              <button class="btn btn-secondary" onclick="clearForm()">Limpiar</button>
            </div>
          </div>

          <!-- TABLE SECTION -->
          <div>
            <h2 class="section-title">Clientes Registrados</h2>

            <div id="tableContainer">
              <div class="empty-state">
                <div class="empty-state-icon">📭</div>
                <p>No hay clientes registrados aún</p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  // Initialize customers from localStorage
  let customers = JSON.parse(localStorage.getItem('customers')) || [];

  function addCustomer() {
    const fullName = document.getElementById('fullName').value.trim();
    const email = document.getElementById('email').value.trim();
    const phone = document.getElementById('phone').value.trim();
    const company = document.getElementById('company').value.trim();
    const position = document.getElementById('position').value.trim();
    const city = document.getElementById('city').value.trim();
    const status = document.getElementById('status').value;
    const notes = document.getElementById('notes').value.trim();

    if (!fullName || !email) {
      showAlert('Por favor completa los campos requeridos (Nombre y Email)', 'danger');
      return;
    }

    const customer = {
      id: Date.now(),
      fullName,
      email,
      phone,
      company,
      position,
      city,
      status,
      notes,
      createdAt: new Date().toLocaleDateString('es-ES')
    };

    customers.push(customer);
    saveCustomers();
    clearForm();
    updateTable();
    showAlert(`Cliente "${fullName}" agregado exitosamente`, 'success');
  }

  function deleteCustomer(id) {
    if (confirm('¿Estás seguro de que deseas eliminar este cliente?')) {
      customers = customers.filter(c => c.id !== id);
      saveCustomers();
      updateTable();
      showAlert('Cliente eliminado', 'success');
    }
  }

  function editCustomer(id) {
    const customer = customers.find(c => c.id === id);
    if (customer) {
      document.getElementById('fullName').value = customer.fullName;
      document.getElementById('email').value = customer.email;
      document.getElementById('phone').value = customer.phone;
      document.getElementById('company').value = customer.company;
      document.getElementById('position').value = customer.position;
      document.getElementById('city').value = customer.city;
      document.getElementById('status').value = customer.status;
      document.getElementById('notes').value = customer.notes;

      deleteCustomer(id);
      document.getElementById('fullName').focus();
    }
  }

  function saveCustomers() {
    localStorage.setItem('customers', JSON.stringify(customers));
  }

  function clearForm() {
    document.getElementById('fullName').value = '';
    document.getElementById('email').value = '';
    document.getElementById('phone').value = '';
    document.getElementById('company').value = '';
    document.getElementById('position').value = '';
    document.getElementById('city').value = '';
    document.getElementById('status').value = 'activo';
    document.getElementById('notes').value = '';
  }

  function updateTable() {
    const container = document.getElementById('tableContainer');

    if (customers.length === 0) {
      container.innerHTML = `
        <div class="empty-state">
          <div class="empty-state-icon">📭</div>
          <p>No hay clientes registrados aún</p>
        </div>
      `;
      return;
    }

    let html = `
      <table class="customers-table">
        <thead>
          <tr>
            <th>Nombre</th>
            <th>Email</th>
            <th>Teléfono</th>
            <th>Empresa</th>
            <th>Estado</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody>
    `;

    customers.forEach(customer => {
      const statusColor = customer.status === 'activo' ? '#28a745' :
                         customer.status === 'cliente-vip' ? '#ffc107' : '#6c757d';
      html += `
        <tr>
          <td><strong>${customer.fullName}</strong></td>
          <td>${customer.email}</td>
          <td>${customer.phone || '-'}</td>
          <td>${customer.company || '-'}</td>
          <td><span style="color: ${statusColor}; font-weight: 500;">${customer.status}</span></td>
          <td>
            <div class="action-buttons">
              <button class="btn-edit" onclick="editCustomer(${customer.id})">Editar</button>
              <button class="btn-delete" onclick="deleteCustomer(${customer.id})">Eliminar</button>
            </div>
          </td>
        </tr>
      `;
    });

    html += `
        </tbody>
      </table>
    `;

    container.innerHTML = html;
  }

  function showAlert(message, type) {
    const alertContainer = document.getElementById('alertContainer');
    const alertClass = type === 'success' ? 'alert-success' : 'alert-danger';
    alertContainer.innerHTML = `<div class="alert ${alertClass}">${message}</div>`;

    setTimeout(() => {
      alertContainer.innerHTML = '';
    }, 4000);
  }

  // Initialize table on load
  updateTable();
</script>
</body>
</html>
